<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="المدير المالي">
  <meta name="theme-color" content="#7c3aed">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="app_icon_192x192.png" sizes="192x192">
  <link rel="icon" type="image/png" href="app_icon_512x512.png" sizes="512x512">
  <link rel="apple-touch-icon" href="app_icon_192x192.png">
  <title>مدير دخلي الذكي</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --purple: #a78bfa; --green: #22d3ee;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; direction: rtl; padding: 20px; }
    .card { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
    h1 { color: var(--purple); }
  </style>
</head>
<body>
  <div class="card">
    <h1>مدير دخلي الذكي</h1>
    <p>جاري تحميل التطبيق...</p>
  </div>
  <script>
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
    window.location.reload();
  </script>
</body>
</html>
